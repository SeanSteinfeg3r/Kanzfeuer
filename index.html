<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportring Kanzfeuer 2026</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    .input-box { display: flex; gap: 5px; margin-top: 5px; }
  </style>
</head>
<body>
  <h1>Sportring Kanzfeuer 2026</h1>
  <div id="schichtplan">Lade Daten...</div>

<script>
    const TOKEN = "yqYC0A9jICnAmlk7RJwIQ79Ack5UIu2O";
    const EINTRAEGE_ID = 1031613;
    const KONFIG_ID = 1031612;

    // Diese IDs sind fix für deine Tabelle (siehe Baserow API Info)
    const F_TAG = "field_1031614";
    const F_ZEIT = "field_1031615";
    const F_AUFGABE = "field_1031616";
    const F_NAME = "field_1031617";

    let daten = {}, config = {};

    async function loadAll() {
        const resE = await fetch(`https://api.baserow.io/api/database/rows/table/${EINTRAEGE_ID}/?user_field_names=false`, { headers: { 'Authorization': `Token ${TOKEN}` }});
        const resK = await fetch(`https://api.baserow.io/api/database/rows/table/${KONFIG_ID}/?user_field_names=false`, { headers: { 'Authorization': `Token ${TOKEN}` }});
        
        const eData = await resE.json();
        const kData = await resK.json();

        // 1. Einträge verarbeiten
        eData.results.forEach(r => {
            let t = r[F_TAG];
            if(!daten[t]) daten[t] = {};
            let key = `${r[F_ZEIT]}||${r[F_AUFGABE]}`;
            if(!daten[t][key]) daten[t][key] = [];
            daten[t][key].push(r[F_NAME]);
        });

        // 2. Config verarbeiten
        kData.results.forEach(r => {
            let values = Object.values(r);
            let tag = values[1]; // Spalte Tag
            let cfg = values[2]; // Spalte Konfig
            if(tag) config[tag] = JSON.parse(cfg);
        });

        render('Aufbau');
    }

    function render(tag) {
        let c = config[tag];
        let html = `<h2>${tag}</h2><table>`;
        c.aufgaben.forEach(a => {
            html += `<tr><td>${a}</td>`;
            c.zeiten.forEach(z => {
                let key = `${z}||${a}`;
                let list = daten[tag]?.[key] || [];
                html += `<td>${list.join(', ')} 
                    <div class="input-box"><input id="i-${key}" placeholder="Name"><button onclick="save('${tag}','${z}','${a}')">OK</button></div>
                    </td>`;
            });
            html += `</tr>`;
        });
        document.getElementById('schichtplan').innerHTML = html + `</table>`;
    }

    async function save(t, z, a) {
        let name = document.getElementById(`i-${z}||${a}`).value;
        await fetch(`https://api.baserow.io/api/database/rows/table/${EINTRAEGE_ID}/?user_field_names=false`, {
            method: 'POST',
            headers: { 'Authorization': `Token ${TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ [F_TAG]: t, [F_ZEIT]: z, [F_AUFGABE]: a, [F_NAME]: name })
        });
        loadAll();
    }

    loadAll();
</script>
</body>
</html>
