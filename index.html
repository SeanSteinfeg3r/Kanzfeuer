<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Sportring Kanzfeuer</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #eee; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
  </style>
</head>
<body>
  <h1>Schichtplan</h1>
  <div id="btns">
    <button onclick="load('Aufbau')">Aufbau</button>
    <button onclick="load('Samstag')">Samstag</button>
    <button onclick="load('Abbau')">Abbau</button>
  </div>
  <div id="plan"></div>

<script>
    const TOKEN = "yqYC0A9jICnAmlk7RJwIQ79Ack5UIu2O";
    const KONFIG_ID = 1031612;
    const EINTRAEGE_ID = 1031613;

    async function load(tag) {
        document.getElementById('plan').innerHTML = "Lade...";
        
        // Hole Daten mit Namen (true)
        const resK = await fetch(`https://api.baserow.io/api/database/rows/table/${KONFIG_ID}/?user_field_names=true`, { headers: {'Authorization': 'Token '+TOKEN}});
        const resE = await fetch(`https://api.baserow.io/api/database/rows/table/${EINTRAEGE_ID}/?user_field_names=true`, { headers: {'Authorization': 'Token '+TOKEN}});
        
        const kData = await resK.json();
        const eData = await resE.json();

        const row = kData.results.find(r => r.Tag === tag);
        if(!row) { document.getElementById('plan').innerHTML = "Keine Konfig für "+tag; return; }
        
        const cfg = JSON.parse(row.Konfig);
        let html = `<h2>${tag}</h2><table>`;
        cfg.aufgaben.forEach(a => {
            html += `<tr><th>${a}</th>`;
            cfg.zeiten.forEach(z => {
                let e = eData.results.filter(r => r.Tag===tag && r.Zeit===z && r.Aufgabe===a);
                html += `<td>${e.map(x => x.Name).join(', ')}<br><input id="${z}-${a}"><button onclick="save('${tag}','${z}','${a}')">OK</button></td>`;
            });
            html += `</tr>`;
        });
        document.getElementById('plan').innerHTML = html + `</table>`;
    }

    async function save(t, z, a) {
        let val = document.getElementById(`${z}-${a}`).value;
        await fetch(`https://api.baserow.io/api/database/rows/table/${EINTRAEGE_ID}/?user_field_names=true`, {
            method: 'POST',
            headers: {'Authorization': 'Token '+TOKEN, 'Content-Type': 'application/json'},
            body: JSON.stringify({Tag: t, Zeit: z, Aufgabe: a, Name: val})
        });
        load(t);
    }
</script>
</body>
</html>
